<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fogarty Holdings</title>
    <style>
        /* Modern Aesthetic Reset */
        :root {
            --bg-color: #0f172a; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Centered Content Box */
        .container {
            text-align: center;
            padding: 2rem;
            z-index: 1;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.15rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .divider {
            width: 50px;
            height: 2px;
            background-color: var(--accent);
            margin: 1.5rem auto;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            letter-spacing: 0.05rem;
            font-weight: 300;
        }

        /* Smooth Entry Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle Background Depth */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.08) 0%, rgba(15, 23, 42, 0) 75%);
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fogarty Holdings</h1>
        <div class="divider"></div>
        <p>Something new is in development.</p>
    </div>

</body>
</html>
